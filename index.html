<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>寶寶性別揭曉｜刮刮樂</title>

  <!-- 主樣式（加版本參數避免快取） -->
  <link rel="stylesheet" href="./style.css?v=20260328" />

  <!-- ScratchCard library（必須先載） -->
  <script src="./vendor/scratchcard.min.js"></script>
</head>

<body>
  <main class="wrap">

    <header class="topbar">
      <h1>👶 寶寶性別揭曉小遊戲</h1>
      <p class="muted">
        第一關刮出民間徵兆，第二關投票猜測，最後揭曉！
      </p>
      <div class="status">
        進度：<b id="phaseLabel">徵兆刮刮樂</b>
      </div>
    </header>

    <!-- ===============================
         PHASE 1：SCRATCH
    ================================ -->
    <section id="phaseScratch" class="card">
      <h2>第一關：懷孕徵兆</h2>

      <div class="progressRow">
        <span class="muted">
          已完成 <b id="scratchDone">0</b> / <b id="scratchTotal">0</b>
        </span>
        <button id="toVoteBtn" class="btn" disabled>
          進入投票猜測 ➜
        </button>
      </div>

      <div id="scratchGrid" class="grid"></div>

      <p class="hint">
        提醒：以下內容皆為民間說法，僅供娛樂 😊
      </p>
    </section>

    <!-- ===============================
         PHASE 2：VOTE
    ================================ -->
    <section id="phaseVote" class="card hidden">
      <h2>第二關：投票猜猜看</h2>

      <div class="voteRow">
        <button id="voteBoy" class="voteBtn boy">👦 我猜男生</button>
        <button id="voteGirl" class="voteBtn girl">👧 我猜女生</button>
      </div>

      <div class="barWrap">
        <div class="bar">
          <div id="boyBar" class="barFill boy"></div>
          <div id="girlBar" class="barFill girl"></div>
        </div>
        <div class="barLabels">
          <div>男生票：<b id="boyVotes">0</b></div>
          <div>女生票：<b id="girlVotes">0</b></div>
        </div>
      </div>

      <div id="voteNote" class="muted small">你尚未投票</div>
    </section>

    <!-- ===============================
         PHASE 3：REVEAL
    ================================ -->
    <section id="phaseReveal" class="card hidden">
      <h2>🎉 揭曉時刻</h2>

      <div class="revealBox">
        <img
          id="babyImg"
          class="babyImg"
          src="./assets/baby.jpg"
          alt="Baby"
        />
        <div id="revealText" class="revealText">是……</div>
      </div>

      <p class="muted small">
        你可以截圖分享給親友 ❤️
      </p>
    </section>

  </main>

  <!-- 揭曉轉場遮罩 -->
  <div id="revealTransition" class="revealTransition">
    揭曉中…
  </div>

  <!-- 主程式 -->
  <script type="module" src="./app.js"></script>
</body>
</html>
